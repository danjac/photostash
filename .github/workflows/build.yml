name: photostash:build
run-name: ${{ github.actor }} is building Docker image
on:
  workflow_dispatch:
jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read
  build:
    uses: ./.github/workflows/docker.yml
    needs: checks
    secrets: inherit # pragma: allowlist secret
    permissions:
      attestations: write
      contents: write
      packages: write
      id-token: write
