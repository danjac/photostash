{% extends "base.html" %}
{% load i18n %}

{% block title %}{% title_tag "Change Password" %}{% endblock %}

{% block content %}
  <div class="py-12 mx-auto max-w-md">
    <h1 class="mb-6 text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100">
      {% translate "Password Changed" %}
    </h1>
    <p class="mb-4 text-sm text-zinc-600 dark:text-zinc-400">
      {% translate "Your password has been changed successfully." %}
    </p>
    <a href="{% url 'account_login' %}" class="btn btn-primary">{% translate "Sign In" %}</a>
  </div>
{% endblock content %}
