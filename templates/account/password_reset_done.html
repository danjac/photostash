{% extends "base.html" %}
{% load i18n %}

{% block title %}{% title_tag "Password Reset" %}{% endblock %}

{% block content %}
  <div class="py-12 mx-auto max-w-md">
    <h1 class="mb-6 text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100">
      {% translate "Password Reset Sent" %}
    </h1>
    <p class="text-sm text-zinc-600 dark:text-zinc-400">
      {% translate "We have sent you an email with a link to reset your password. Please check your inbox." %}
    </p>
  </div>
{% endblock content %}
