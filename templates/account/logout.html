{% extends "base.html" %}
{% load i18n %}

{% block title %}{% title_tag _("Sign Out") %}{% endblock %}

{% block content %}
  <div class="py-12 mx-auto max-w-md">
    <h1 class="mb-6 text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100">
      {% translate "Sign Out" %}
    </h1>
    <p class="mb-6 text-sm text-zinc-600 dark:text-zinc-400">
      {% translate "Are you sure you want to sign out?" %}
    </p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      {{ redirect_field }}
      <button type="submit" class="btn btn-primary">{% translate "Sign Out" %}</button>
    </form>
  </div>
{% endblock content %}
