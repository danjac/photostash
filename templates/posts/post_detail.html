{% extends "base.html" %}
{% load i18n %}

{% block content %}
  {% include "header.html" with title=post.title %}
  <div class="mt-4">
    <p>{{ post.description }}</p>
    <div class="flex gap-3 mt-6">
      {% if request.user == post.owner %}
        <a href="{% url 'posts:post_edit' post.pk %}" class="btn btn-secondary">
          {% translate "Edit" %}
        </a>
        <a href="{% url 'posts:post_delete' post.pk %}" class="btn btn-danger">
          {% translate "Delete" %}
        </a>
      {% endif %}
    </div>
  </div>
{% endblock content %}
