apiVersion: v1
kind: Secret
metadata:
  name: secrets
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://postgres:%s@postgres.%s.svc.cluster.local:5432/postgres" .Values.secrets.postgresPassword .Release.Namespace | quote }}
  MAILGUN_API_KEY: {{ .Values.secrets.mailgunApiKey|quote }}
  OPEN_TELEMETRY_URL: {{ .Values.secrets.openTelemetryUrl|quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword|quote }}
  PWA_SHA256_FINGERPRINTS: {{ .Values.secrets.pwaSha256Fingerprints|quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword|quote }}
  REDIS_URL: {{ printf "redis://:%s@redis.%s.svc.cluster.local:6379/0" .Values.secrets.redisPassword .Release.Namespace | quote }}
  SECRET_KEY: {{ .Values.secrets.djangoSecretKey|quote }}
  SECRET_KEY_FALLBACKS: {{ .Values.secrets.djangoSecretKeyFallbacks|quote }}
  SENTRY_URL: {{ .Values.secrets.sentryUrl|quote }}
  USE_S3_STORAGE: {{ .Values.secrets.useS3Storage|quote }}
  HETZNER_STORAGE_ACCESS_KEY: {{ .Values.secrets.hetznerStorageAccessKey|quote }}
  HETZNER_STORAGE_SECRET_KEY: {{ .Values.secrets.hetznerStorageSecretKey|quote }}
  HETZNER_STORAGE_BUCKET: {{ .Values.secrets.hetznerStorageBucket|quote }}
  HETZNER_STORAGE_ENDPOINT: {{ .Values.secrets.hetznerStorageEndpoint|quote }}
  HETZNER_STORAGE_REGION: {{ .Values.secrets.hetznerStorageRegion|quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-origin-cert
type: kubernetes.io/tls
stringData:
  tls.crt: {{ .Values.secrets.cloudflare.cert|quote }}
  tls.key: {{ .Values.secrets.cloudflare.key|quote }}
