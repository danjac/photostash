apiVersion: batch/v1
kind: Job
metadata:
  name: django-release
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        role: jobrunner
      containers:
        - name: django-release
          image: {{ .Values.image }}
          command: ["/bin/sh", "-c"]
          args: ["./release.sh"]
          envFrom:
            - configMapRef:
                name: configmap
            - secretRef:
                name: secrets
