apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: django-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: django-app
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        role: webapp
      containers:
        - name: django
          image: {{ .Values.image }}
          imagePullPolicy: Always
          resources:
            requests:
              memory: {{ .Values.resources.app.requests.memory|quote }}
              cpu: {{ .Values.resources.app.requests.cpu|quote }}
            limits:
              memory: {{ .Values.resources.app.limits.memory|quote }}
              cpu: {{ .Values.resources.app.limits.cpu|quote }}
          command: ["/bin/sh", "-c"]
          args: ["./gunicorn.sh"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: configmap
            - secretRef:
                name: secrets
          livenessProbe:
            httpGet:
              path: /ht/live/
              port: 8000
              httpHeaders:
                - name: Host
                  value: {{ .Values.domain }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ht/ready/
              port: 8000
              httpHeaders:
                - name: Host
                  value: {{ .Values.domain }}
            initialDelaySeconds: 30
            periodSeconds: 30
